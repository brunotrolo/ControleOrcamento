<script>
function navigateTo(viewId, title) {
  document.querySelectorAll('.view-container').forEach(function(v) {
    v.classList.remove('active');
  });
  var target = document.getElementById(viewId);
  if (target) {
    target.classList.add('active');
    document.getElementById('page-title').textContent = title;
    window.dispatchEvent(new CustomEvent('viewFocus', { detail: { viewId: viewId } }));
  }
}

var SyncMonitor = (function() {
  var _el = function() { return document.getElementById('sync-monitor'); };
  var _icon = function() { return document.getElementById('sync-icon'); };
  var _label = function() { return document.getElementById('sync-label'); };
  var _timer = function() { return document.getElementById('sync-timer'); };
  var _successTimer = null;
  return {
    update: function(state, message, metrics) {
      var el = _el();
      if (!el) return;
      el.className = 'sync-status ' + state;
      if (_label()) _label().textContent = message;
      if (state === 'loading') {
        if (_icon()) _icon().textContent = 'sync';
        clearTimeout(_successTimer);
      } else {
        if (_icon()) _icon().textContent = 'radio_button_checked';
        if (metrics && _timer()) {
          var s = (metrics.gas / 1000).toFixed(2);
          var ms = Math.round(metrics.cpu);
          _timer().textContent = 'GAS: ' + s + 's | CPU: ' + ms + 'ms';
        }
        if (state === 'success') {
          _successTimer = setTimeout(function() {
            if (_el()) _el().className = 'sync-status idle';
            if (_label()) _label().textContent = 'Sincronizado';
          }, 3000);
        }
      }
    }
  };
})();

(function initTheme() {
  var btn = document.getElementById('theme-toggle');
  var saved = localStorage.getItem('bd-theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark-theme' : 'light-theme');
  function apply(theme) {
    document.body.className = theme;
    var icon = btn && btn.querySelector('.material-symbols-rounded');
    if (icon) icon.textContent = theme === 'dark-theme' ? 'light_mode' : 'dark_mode';
  }
  apply(saved);
  if (btn) {
    btn.addEventListener('click', function() {
      var next = document.body.classList.contains('dark-theme') ? 'light-theme' : 'dark-theme';
      apply(next);
      localStorage.setItem('bd-theme', next);
    });
  }
})();

document.addEventListener('DOMContentLoaded', function() {
  window.dispatchEvent(new CustomEvent('viewFocus', { detail: { viewId: 'view-home' } }));
});
</script>
