<style>
.nf-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.nf-search {
  flex: 1;
  min-width: 180px;
  max-width: 320px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--c-surface-cont-low);
  border: 1px solid var(--c-outline-variant);
  border-radius: var(--border-radius-sm);
  padding: 0 12px;
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}

.nf-search:focus-within {
  border-color: var(--c-primary);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--c-primary) 12%, transparent);
}

.nf-search .material-symbols-rounded { font-size: 18px; color: var(--c-outline); flex-shrink: 0; }

.nf-search input {
  border: none;
  background: transparent;
  outline: none;
  font-size: 0.875rem;
  color: var(--c-on-surface);
  font-family: inherit;
  width: 100%;
  padding: 9px 0;
}

.nf-search input::placeholder { color: var(--c-outline); }

.nf-count {
  font-size: 0.775rem;
  color: var(--c-outline);
  font-family: 'DM Mono', monospace;
  margin-left: auto;
  white-space: nowrap;
}

/* Cabeçalho clicável para ordenação */
.modern-table thead th.sortable {
  cursor: pointer;
  user-select: none;
}

.modern-table thead th.sortable:hover {
  background: var(--c-surface-cont);
  color: var(--c-on-surface);
}

.col-sort-icon {
  font-size: 14px;
  opacity: 0.4;
  margin-left: 4px;
  vertical-align: middle;
  font-variation-settings: 'FILL' 0, 'wght' 300;
}

th.sort-asc  .col-sort-icon,
th.sort-desc .col-sort-icon { opacity: 1; color: var(--c-primary); }
</style>

<div class="card">
  <div class="card-header">
    <div>
      <h3>Notas Fiscais</h3>
      <p class="card-subtitle">Colunas e ordem refletem a planilha automaticamente</p>
    </div>
    <button class="btn-icon" id="btn-nf-refresh" title="Atualizar">
      <span class="material-symbols-rounded">refresh</span>
    </button>
  </div>

  <div class="nf-toolbar">
    <div class="nf-search">
      <span class="material-symbols-rounded">search</span>
      <input id="nf-filter" type="text" placeholder="Filtrar qualquer campo...">
    </div>
    <span id="nf-count" class="nf-count">— registros</span>
  </div>

  <div class="table-container">
    <table class="modern-table" id="tabela-notas">
      <thead id="thead-notas"><tr></tr></thead>
      <tbody id="corpo-notas">
        <tr>
          <td class="txt-center" style="padding:32px; color:var(--c-outline)">
            Carregando dados...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const NotasFiscaisManager = (() => {

  let _allData  = [];
  let _headers  = [];
  let _labels   = {}; // { chave_normalizada: "Nome Original da Planilha" }
  let _loaded   = false;
  let _sortCol  = null;
  let _sortDir  = 'asc';

  // Colunas que recebem badge colorido baseado no valor
  const STATUS_COLS = ['status'];

  // Colunas renderizadas com fonte mono (detecção automática por nome)
  const MONO_PATTERN = /nfe|cnpj|valor|data|horas|competencia|codigo/i;

  // Colunas de valor monetário (alinhamento à direita + formatação)
  const MONEY_PATTERN = /valor/i;

  // Mapeamento de status → classe de badge
  const STATUS_MAP = {
    'paga':       'badge-success',
    'concluída':  'badge-success',
    'concluida':  'badge-success',
    'autorizada': 'badge-success',
    'cancelada':  'badge-error',
    'pendente':   'badge-warning',
    'em análise': 'badge-info',
    'em analise': 'badge-info',
  };

  function badgeClass(v) {
    return STATUS_MAP[(v || '').toLowerCase().trim()] || 'badge-neutral';
  }

  // ------------------------------------------------------------------
  // LOAD
  // ------------------------------------------------------------------
  function load() {
    if (_loaded) return;
    SyncMonitor.update('loading', 'Buscando notas...');
    const t0 = performance.now();

    google.script.run
      .withSuccessHandler(res => {
        if (!res.success) {
          SyncMonitor.update('error', res.message || 'Erro');
          return;
        }
        _headers = res.headers || [];
        _labels  = res.labels  || {};
        _allData = res.data    || [];
        _loaded  = true;
        buildHeader();
        renderTable(_allData);
        SyncMonitor.update('success', 'Notas carregadas', {
          gas: res.metrics.executionTime,
          cpu: performance.now() - t0
        });
      })
      .withFailureHandler(err => {
        SyncMonitor.update('error', 'Falha na comunicação');
        console.error(err);
      })
      .routerGetNotas();
  }

  function reload() {
    _loaded  = false;
    _allData = [];
    _headers = [];
    _labels  = {};
    _sortCol = null;
    _sortDir = 'asc';
    load();
  }

  // ------------------------------------------------------------------
  // CONSTRUÇÃO DINÂMICA DO CABEÇALHO
  // ------------------------------------------------------------------
  function buildHeader() {
    const tr = document.querySelector('#thead-notas tr');
    tr.innerHTML = _headers.map(key => `
      <th class="sortable" data-key="${key}">
        ${esc(_labels[key] || key)}
        <span class="material-symbols-rounded col-sort-icon">unfold_more</span>
      </th>
    `).join('');

    // Evento de ordenação em cada th
    tr.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => sortBy(th.dataset.key));
    });
  }

  // ------------------------------------------------------------------
  // ORDENAÇÃO
  // ------------------------------------------------------------------
  function sortBy(key) {
    if (_sortCol === key) {
      _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      _sortCol = key;
      _sortDir = 'asc';
    }

    // Atualiza ícones
    document.querySelectorAll('#thead-notas th').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
      const icon = th.querySelector('.col-sort-icon');
      if (icon) icon.textContent = 'unfold_more';

      if (th.dataset.key === key) {
        th.classList.add(_sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
        if (icon) icon.textContent = _sortDir === 'asc' ? 'arrow_upward' : 'arrow_downward';
      }
    });

    // Ordena e re-renderiza com o filtro atual
    const query = document.getElementById('nf-filter').value;
    const data  = applyFilter(query, false);
    const sorted = [...data].sort((a, b) => {
      const va = String(a[key] || '');
      const vb = String(b[key] || '');
      return _sortDir === 'asc' ? va.localeCompare(vb, 'pt-BR') : vb.localeCompare(va, 'pt-BR');
    });
    renderTable(sorted);
  }

  // ------------------------------------------------------------------
  // FILTRO
  // ------------------------------------------------------------------
  function applyFilter(query, render = true) {
    if (!query) {
      if (render) renderTable(_allData);
      return _allData;
    }
    const q = query.toLowerCase();
    const filtered = _allData.filter(row =>
      _headers.some(key => String(row[key] || '').toLowerCase().includes(q))
    );
    if (render) renderTable(filtered);
    return filtered;
  }

  // ------------------------------------------------------------------
  // RENDERIZAÇÃO — buffer join para máxima performance
  // ------------------------------------------------------------------
  function renderTable(data) {
    const tbody = document.getElementById('corpo-notas');
    const count = document.getElementById('nf-count');

    if (count) count.textContent = data.length + ' registros';

    if (!data.length) {
      const cols = _headers.length || 1;
      tbody.innerHTML = `<tr><td colspan="${cols}" class="txt-center" style="padding:40px;color:var(--c-outline)">Nenhum registro encontrado.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(row => {
      const cells = _headers.map(key => {
        const raw = row[key];
        const val = (raw !== null && raw !== undefined && raw !== '') ? raw : null;

        // Badge de status
        if (STATUS_COLS.includes(key)) {
          const label = val ? String(val) : '—';
          return `<td><span class="badge ${badgeClass(label)}">${esc(label)}</span></td>`;
        }

        // Valor monetário
        if (MONEY_PATTERN.test(key) && val !== null) {
          return `<td class="col-valor">${fmtMoeda(val)}</td>`;
        }

        // Fonte mono para campos técnicos
        if (MONO_PATTERN.test(key)) {
          return `<td class="col-mono">${val !== null ? esc(String(val)) : '<span style="opacity:.35">—</span>'}</td>`;
        }

        // Default
        return `<td>${val !== null ? esc(String(val)) : '<span style="opacity:.35">—</span>'}</td>`;
      }).join('');

      return `<tr>${cells}</tr>`;
    }).join('');
  }

  // ------------------------------------------------------------------
  // UTILITÁRIOS
  // ------------------------------------------------------------------
  function esc(v) {
    return String(v)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  function fmtMoeda(v) {
    const n = parseFloat(String(v).replace(',', '.'));
    if (isNaN(n)) return esc(String(v));
    return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  // ------------------------------------------------------------------
  // EVENTOS
  // ------------------------------------------------------------------
  document.getElementById('btn-nf-refresh').addEventListener('click', () => reload());

  let _debounce;
  document.getElementById('nf-filter').addEventListener('input', e => {
    clearTimeout(_debounce);
    _debounce = setTimeout(() => applyFilter(e.target.value), 200);
  });

  window.addEventListener('viewFocus', e => {
    if (e.detail.viewId === 'view-notas-fiscais') load();
  });

  return { load, reload };
})();
</script>
