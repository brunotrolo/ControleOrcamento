<!--
  SubPage_Prestador.html - Cards de profissionais
-->

<script>
window.SubPagePrestador = (function() {

  function _esc(v) {
    return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function _formatCurrency(val) {
    var n = parseFloat(val) || 0;
    return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function render(kpiKey, label, allData) {
    var profissionalMap = {};

    // Extrair profissionais únicos
    allData.forEach(function(row) {
      if ((row.status_nfe || '').trim() !== 'Autorizada') return;
      
      // Se houver array de profissionais (de routerGetNotaFiscalCombined)
      if (row.profissionais && Array.isArray(row.profissionais)) {
        row.profissionais.forEach(function(prof) {
          var key = (prof.matricula || 'N/A') + '|' + (prof.nome_profissional || 'N/A');
          
          if (!profissionalMap[key]) {
            profissionalMap[key] = {
              matricula: prof.matricula || 'N/A',
              nome_profissional: prof.nome_profissional || 'N/A',
              papel_prestador: prof.papel_prestador || 'N/A',
              total_horas: 0,
              hh: parseFloat(prof.hh) || 0,
              subtotal_nfe: 0,
              nfs: 0
            };
          }
          
          profissionalMap[key].total_horas += parseFloat(prof.total_horas) || 0;
          profissionalMap[key].subtotal_nfe += parseFloat(prof.subtotal_nfe) || 0;
          profissionalMap[key].nfs++;
        });
      }
      // Fallback: se vier direto nas colunas da NOTA_FISCAL
      else if (row.nome_profissional && row.nome_profissional !== 'N/A') {
        var key = (row.matricula || 'N/A') + '|' + (row.nome_profissional || 'N/A');
        
        if (!profissionalMap[key]) {
          profissionalMap[key] = {
            matricula: row.matricula || 'N/A',
            nome_profissional: row.nome_profissional || 'N/A',
            papel_prestador: row.papel_prestador || 'N/A',
            total_horas: 0,
            hh: parseFloat(row.hh) || 0,
            subtotal_nfe: 0,
            nfs: 0
          };
        }
        
        profissionalMap[key].total_horas += parseFloat(row.total_horas) || 0;
        profissionalMap[key].subtotal_nfe += parseFloat(row.subtotal_nfe) || 0;
        profissionalMap[key].nfs++;
      }
    });

    var sorted = Object.keys(profissionalMap).sort(function(a, b) {
      return profissionalMap[b].subtotal_nfe - profissionalMap[a].subtotal_nfe;
    });

    if (sorted.length === 0) {
      return '<p style="color:var(--c-outline);text-align:center;padding:20px;">Nenhum profissional</p>';
    }

    var totalGeral = 0;
    sorted.forEach(function(p) { totalGeral += profissionalMap[p].subtotal_nfe; });

    var html = '<div style="padding:20px;">' +
      '<div style="font-size:0.875rem;font-weight:600;color:var(--c-on-surface);margin-bottom:20px;">Profissionais (' + sorted.length + ')</div>' +
      '<div style="display:flex;flex-direction:column;gap:12px;">';

    sorted.forEach(function(key) {
      var prof = profissionalMap[key];
      var pct = (prof.subtotal_nfe / totalGeral) * 100;

      html += '<div style="padding:14px;background:var(--c-surface-cont-low);border-radius:var(--border-radius-md);border-left:4px solid #6366f1;">' +
        '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">' +
        '<div style="flex:1;">' +
        '<div style="display:flex;gap:10px;align-items:flex-start;">' +
        '<div style="background:var(--c-primary);color:white;border-radius:var(--border-radius-md);padding:4px 8px;font-size:0.65rem;font-weight:700;min-width:45px;text-align:center;">' + _esc(prof.matricula) + '</div>' +
        '<div>' +
        '<div style="font-size:0.875rem;font-weight:700;color:var(--c-on-surface);">' + _esc(prof.nome_profissional) + '</div>' +
        '<div style="font-size:0.72rem;color:var(--c-outline);margin-top:2px;">' + _esc(prof.papel_prestador) + '</div>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '<div style="text-align:right;">' +
        '<div style="font-size:0.95rem;font-weight:700;color:var(--c-on-surface);font-family:DM Mono,monospace;">' + _formatCurrency(prof.subtotal_nfe) + '</div>' +
        '<div style="font-size:0.72rem;color:var(--c-primary);font-weight:600;margin-top:2px;">' + pct.toFixed(1) + '%</div>' +
        '</div>' +
        '</div>' +
        '<div style="background:var(--c-surface-cont);border-radius:4px;height:6px;overflow:hidden;margin-bottom:10px;">' +
        '<div style="background:linear-gradient(to right, #6366f1, #818cf8);height:100%;width:' + pct + '%;"></div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;font-size:0.7rem;">' +
        '<div>' +
        '<div style="color:var(--c-outline);font-weight:600;">NFs</div>' +
        '<div style="color:var(--c-on-surface);font-weight:700;margin-top:2px;">' + prof.nfs + '</div>' +
        '</div>' +
        '<div>' +
        '<div style="color:var(--c-outline);font-weight:600;">Horas</div>' +
        '<div style="color:var(--c-on-surface);font-weight:700;margin-top:2px;font-family:DM Mono,monospace;">' + prof.total_horas.toFixed(1) + '</div>' +
        '</div>' +
        '<div>' +
        '<div style="color:var(--c-outline);font-weight:600;">H/H</div>' +
        '<div style="color:var(--c-on-surface);font-weight:700;margin-top:2px;font-family:DM Mono,monospace;">R$ ' + prof.hh.toFixed(2) + '</div>' +
        '</div>' +
        '</div>' +
        '</div>';
    });

    html += '</div></div>';
    return html;
  }

  return { render };
})();

window.addEventListener('loadKpiDetails', function(e) {
  var detail = e.detail;
  if (!detail.container || detail.kpiKey !== 'prestador') return;
  detail.container.innerHTML = SubPagePrestador.render(detail.kpiKey, detail.label, detail.allData);
});
</script>
